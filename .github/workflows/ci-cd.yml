name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # JOB 1: Dijalankan di server GitHub (gratis & tidak membebani server Anda)
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

  # JOB 2: Dijalankan di server GitHub (gratis & tidak membebani server Anda)
  docker-build-and-push:
    name: Docker Build and Push
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/porto-app:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/porto-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/porto-app:buildcache,mode=max

  # JOB 3: Dijalankan LANGSUNG di server Anda tanpa perlu akses SSH
  deploy:
    name: Deploy to Server
    needs: docker-build-and-push
    runs-on: self-hosted # <--- Telah diubah menggunakan server Anda
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Pull and Run Docker Container
        run: |
          echo "Menarik image terbaru dari DockerHub..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/porto-app:latest
          
          echo "Menghentikan dan menghapus container lama (jika ada)..."
          docker stop porto-app || true
          docker rm porto-app || true
          
          echo "Menjalankan container baru..."
          docker run -d --name porto-app -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/porto-app:latest