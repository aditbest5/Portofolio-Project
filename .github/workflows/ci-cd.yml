name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # JOB 1: Dijalankan di server GitHub (Proses Build ReactJS)
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # Cache dinonaktifkan (diambil dari kosongan/tanpa cache npm)

      - name: Install Dependencies
        run: npm  install --no-audit --no-fund

      - name: Build Project
        run: npm run build

      # SHARE ARTIFACT: Simpan folder hasil build agar bisa dipakai di Job berikutnya
      - name: Upload Build Folder
        uses: actions/upload-artifact@v4
        with:
          name: react-build-output
          path: build/ # Sesuaikan jika folder build kamu namanya 'dist' (misal pengguna Vite)
          retention-days: 1

  # JOB 2: Dijalankan di server GitHub (Pembungkusan Docker)
  docker-build-and-push:
    name: Docker Build and Push
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # AMBIL ARTIFACT: Unduh folder hasil build dari Job 1
      - name: Download Build Folder
        uses: actions/download-artifact@v4
        with:
          name: react-build-output
          path: build/ # Meletakkan kembali folder build ke root direktori sebelum Docker berjalan

      # Pastikan file lama tidak tersisa di Docker build context
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
          
      # Login ke DockerHub menggunakan Secrets
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Image dengan memaksa No-Cache
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/porto-app:latest
          no-cache: true # <--- WAJIB: Memaksa Docker build dari awal tanpa layer cache
          cache-from: ""
          cache-to: ""

  # JOB 3: Dijalankan LANGSUNG di server self-hosted kamu
  deploy:
    name: Deploy to Server
    needs: docker-build-and-push
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Pull and Run Docker Container
        run: |
          echo "Menarik image terbaru dari DockerHub..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/porto-app:latest

          echo "Menghentikan dan menghapus container lama (jika ada)..."
          docker stop porto-app || true
          docker rm porto-app || true

          echo "Membersihkan image lama yang menggantung (dangling image)..."
          docker image prune -f

          echo "Menjalankan container baru..."
          docker run -d --name porto-app -p 3000:80 ${{ secrets.DOCKERHUB_USERNAME }}/porto-app:latest

  # JOB 4: Mengirimkan Notifikasi ke Discord
  notify:
    name: Discord Notification
    needs: [build-and-test, docker-build-and-push, deploy]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Send Success Notification
        if: ${{ needs.deploy.result == 'success' }}
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"embeds": [{"title": "✅ Deployment Berhasil!", "description": "Aplikasi **Portofolio-Project** telah berhasil di-deploy ke server dengan sukses.", "color": 65280}]}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Send Failure Notification
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"embeds": [{"title": "❌ Deployment Gagal", "description": "Terjadi kesalahan saat mem-build atau men-deploy **Portofolio-Project**. Silakan cek log GitHub Actions untuk detailnya.", "color": 16711680}]}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}